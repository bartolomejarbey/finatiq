<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finatiq - Offline</title>
  <style>
    body { font-family: Inter, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #F8FAFC; color: #0F172A; }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #64748B; }
    button { margin-top: 1rem; padding: 0.75rem 1.5rem; background: #2563EB; color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Jste offline</h1>
    <p>Zkontrolujte připojení k internetu a zkuste to znovu.</p>
    <button onclick="location.reload()">Zkusit znovu</button>
  </div>
</body>
</html>
